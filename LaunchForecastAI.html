<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open ForecastAI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        h1 { margin-bottom: 2rem; }
        .btn {
            display: inline-block;
            background: white;
            color: #4338ca;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        p { margin-top: 1.5rem; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ForecastAI</h1>
        <a href="http://127.0.0.1:8000/" class="btn">Launch Website</a>
        <p>Ensure the Django server is running before clicking.</p>
    </div>
    <script>
        // Optional: Auto-redirect if you want zero clicks
        // window.location.href = "http://127.0.0.1:8000/";
    </script>
</body>
</html>
